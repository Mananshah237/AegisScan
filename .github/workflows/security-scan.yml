name: Security Scan

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight
  workflow_dispatch:
    inputs:
      target_url:
        description: 'URL to scan'
        required: true
      api_url:
        description: 'AegisScan API URL'
        required: true
      api_key:
        description: 'AegisScan API key'
        required: true
      profile:
        description: 'Scan profile'
        required: false
        default: 'quick'
        type: choice
        options:
          - quick
          - full

permissions:
  contents: read

jobs:
  autoappsec-scan:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        
    - name: Install AutoAppSec CLI
      run: |
        python -m pip install --upgrade pip
        # Install from local source
        pip install typer rich shellingham requests
        # In real scenario, pip install autoappsec-cli
        
    - name: Run Security Scan
      run: |
        export PYTHONPATH=$PYTHONPATH:.
        python -m backend.cli.main scan run ${{ inputs.target_url }} \
          --profile ${{ inputs.profile || 'quick' }} \
          --api-url ${{ inputs.api_url }} \
          --api-key ${{ inputs.api_key }} \
          --wait
        
    - name: Check Status
      if: failure()
      run: echo "Security scan failed or found critical vulnerabilities!"
